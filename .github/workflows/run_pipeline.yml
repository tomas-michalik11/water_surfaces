name: Monthly Water Surface Update

on:
  schedule:
    # Run at 00:00 on the 1st day of every month
    - cron: '0 0 1 * *'
  # Allow manual trigger from the GitHub UI for testing
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # This automatically uses your username/repo (e.g., tomas/water_surface)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push to GHCR
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided by Actions
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  run-pipeline:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    
    steps:
      - name: Run the Docker Container
        # We map GitHub Secrets to local step environment variables
        env:
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT_URL_S3 }}
        run: |
          docker run --rm \
            -e R2_BUCKET_NAME \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_ENDPOINT_URL_S3 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
